name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Inspect build output
        run: |
          echo "=== .output/server contents ==="
          ls -la .output/server
          echo "=== wrangler.json ==="
          cat .output/server/wrangler.json || echo "wrangler.json not found"

      - name: Clean conflicting deploy config
        run: rm -rf .wrangler/deploy/config.json

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_LOG: debug
        run: npx wrangler deploy --cwd .output/server
